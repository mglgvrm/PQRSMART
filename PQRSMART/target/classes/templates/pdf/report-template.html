<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>

        body{
            font-family: Arial, sans-serif;
            font-size:12px;
        }

        header{
            text-align:center;
            margin-bottom:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th, td{
            border:1px solid #ccc;
            padding:6px;
            text-align:left;
        }

        th{
            background:#f2f2f2;
        }

    </style>
</head>

<body>

<header>
    <h2>Reporte mensual PQRS</h2>
    <p>Año: <span th:text="${anio}"></span></p>
</header>

<table>

    <thead>
    <tr>
        <th>ID</th>
        <th>Radicado</th>
        <th>Usuario</th>
        <th>Tipo</th>
        <th>Categoría</th>
        <th>Descripción</th>
        <th>Fecha</th>
        <th>Estado</th>
        <th>Dependencia</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="pqrs : ${pqrsDelMes}">

        <td th:text="${pqrs.idRequest}"></td>

        <td th:text="${pqrs.radicado}"></td>

        <td th:text="${pqrs.user.name}"></td>

        <td th:text="${pqrs.requestType.nameRequestType}"></td>

        <td th:text="${pqrs.category.nameCategory}"></td>

        <td th:text="${pqrs.description}"></td>

        <td th:text="${pqrs.date}"></td>

        <td th:text="${pqrs.requestState.nameRequestState}"></td>

        <td th:text="${pqrs.dependence.nameDependence}"></td>

    </tr>

    </tbody>

</table>

</body>
</html>
